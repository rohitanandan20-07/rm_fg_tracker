# Blueprint: two Web Services from one repo (rm_fg_tracker/)
services:
  - type: web
    name: rm-fg-tracker-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"

  - type: web
    name: rm-fg-tracker-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run dashboard/streamlit_app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: FASTAPI_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
