services:
  - type: web
    name: rm-fg-tracker-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false  # You will enter this manually in the Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.9"
